[package]
name = "incus-client"
version = "0.1.1"
authors = ["dev@leupolz.eu"]
description = "Auto-generated Rust client for the Incus container and VM manager REST API"
license = "Apache-2.0"
edition = "2021"
repository = "https://github.com/joleuger/incus-client-rs"
homepage = "https://github.com/joleuger/incus-client-rs"
documentation = "https://docs.rs/incus-client"
readme = "README.md"
keywords = ["incus", "lxd", "containers", "vm", "api"]
categories = ["api-bindings", "virtualization"]

[dependencies]
serde = { version = "^1.0", features = ["derive"] }
serde_json = "^1.0"
serde_repr = "^0.1"
url = "^2.5"
chrono = { version = "^0.4",  features = ["serde"] }
reqwest = { version = "^0.13", default-features = false, features = ["json", "multipart", "query", "form"] }
nix = { version = "^0.31",  features = ["fs","user"] }

[features]
default = ["native-tls"]
native-tls = ["reqwest/native-tls"]
rustls = ["reqwest/rustls"]
